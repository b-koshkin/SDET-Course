name: Playwright Tests

on:
  pull_request:
    branches: [main]
    paths:
      - continous_integration/**
  workflow_dispatch:

# Cancel in-progress runs for same PR
concurrency:
  group: playwright-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Minimal read-only permissions
permissions:
  contents: read

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: github-pages
    permissions:
      contents: read
      pages: write
      id-token: write
    defaults:
      run:
        working-directory: continous_integration
    env:
      CI: true

    steps:
      # Check out source code
      - name: Checkout
        uses: actions/checkout@v4

      # Set up Node.js LTS with npm cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: continous_integration/package-lock.json

      # Install dependencies (frozen lockfile)
      - name: Install dependencies
        run: npm ci

      # Install Playwright browsers and system dependencies
      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      # Run all Playwright tests in parallel
      - name: Run Playwright tests
        run: npx playwright test

      # Upload HTML report for review (always, even on failure)
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: continous_integration/playwright-report/
          retention-days: 30

      # Upload traces for debugging failed tests (always)
      - name: Upload traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: continous_integration/test-results/**/trace*.zip
          retention-days: 30

      # Build history.json by merging prior gh-pages record with current run entry
      - name: Prepare history.json
        if: always() && github.ref == 'refs/heads/main'
        shell: bash
        run: |
          HISTORY_FILE=playwright-report/history.json
          NEW_ENTRY=$(jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --arg sha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --arg result "${{ job.status }}" \
            '{timestamp: $ts, runUrl: $url, commitSha: $sha, ref: $ref, result: $result}')

          PREV=$(git ls-remote --exit-code origin gh-pages > /dev/null 2>&1 && \
            git fetch origin gh-pages --depth=1 --quiet 2>/dev/null && \
            git show origin/gh-pages:history.json 2>/dev/null || echo '[]')

          echo "$PREV" | jq --argjson entry "$NEW_ENTRY" '. + [$entry]' > "$HISTORY_FILE" || \
            echo "[$NEW_ENTRY]" > "$HISTORY_FILE"

      # Upload playwright-report as Pages site artifact
      - name: Upload Pages artifact
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: continous_integration/playwright-report/

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  security-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: continous_integration
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: continous_integration/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run dependency vulnerability scan
        run: |
          npm audit --audit-level=high --json > audit-report.json || true
          echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 | tail -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high
